
name: CD
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to use when running manually (e.g. v0.1.0-manual)'
        required: true
        default: 'manual-build'

jobs:
  release:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    environment: production
    concurrency: rtl-release
    permissions:
      contents: write
    steps:

      - name: Use pre-cloned playground from AMI
        run: |
          rm -rf playground   
          if [ -d /opt/playground ]; then
            echo "Using pre-baked playground from AMI"
            cp -r /opt/playground playground
          else
            echo "AMI playground not found, falling back to fresh clone"
            git config --global url."https://github.com/".insteadOf "git@github.com:"
            git clone https://github.com/morphingmachines/playground.git playground
            cd playground
            sed -i 's|git@github.com:|https://github.com/|g' .gitmodules
            git submodule sync
            git submodule update --init --depth=1 dependencies/cde
            git submodule update --init --depth=1 dependencies/diplomacy
            git submodule update --init --depth=1 dependencies/berkeley-hardfloat
            git submodule update --init --depth=1 dependencies/rocket-chip
            git submodule update --init --depth=1 dependencies/emitrtl
            git submodule update --init --depth=1 dependencies/chipyard
          fi      
      - name: Checkout myproject
        uses: actions/checkout@v4
        with:
          ref: main
          path: myproject

      - name: Cache Mill dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.ivy2/cache
            ~/.cache/coursier
          key: ${{ runner.os }}-mill-${{ hashFiles('myproject/build.sc') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Set Mill version files
        run: |
          echo "0.11.6" > playground/.mill-version
          echo "0.11.6" > myproject/.mill-version

      - name: Generate RTL
        working-directory: myproject
        env:
          JAVA_OPTS: "-Xmx4g -Xss8m"
        run: make rtl

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag_name=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "tag_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=auto-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package RTL
        working-directory: myproject
        run: |
          if [ ! -d generated_sv_dir ] || [ -z "$(find generated_sv_dir -name '*.sv' -print -quit)" ]; then
            echo "No .sv files were generated — aborting release."
            exit 1
          fi
          tar -czvf ../generated-rtl-${{ steps.tag.outputs.tag_name }}.tar.gz generated_sv_dir/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: RTL Release ${{ steps.tag.outputs.tag_name }}
          files: generated-rtl-*.tar.gz
          generate_release_notes: true
